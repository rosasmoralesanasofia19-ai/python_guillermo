<!DOCTYPE HTML>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if producto %}Editar Producto{% else %}Registro de Producto{% endif %} | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h3 class="text-center">
                            {% if producto %}Editar Producto{% else %}Registro de Productos{% endif %}
                        </h3>
                    </div>
                    <div class="card-body">
                        <!-- El formulario se envía mediante JavaScript (fetch) para poder
                             mostrar las alertas de SweetAlert2 según el resultado -->
                        <form id="formProducto">

                            <!-- Id oculto: vacío = registro nuevo, con valor = edición -->
                            <input type="hidden" id="producto_id" value="{{ producto.id if producto else '' }}">

                            <div class="mb-3">
                                <label class="form-label">Código</label>
                                <input type="text" id="codigo" name="codigo" class="form-control"
                                       value="{{ producto.codigo if producto else '' }}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="nombre" name="nombre" class="form-control"
                                       value="{{ producto.nombre if producto else '' }}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Precio</label>
                                <input type="number" id="precio" name="precio" class="form-control"
                                       value="{{ producto.precio if producto else '' }}" min="0" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <input type="text" id="categoria" name="categoria" class="form-control"
                                       value="{{ producto.categoria if producto else '' }}" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                {% if producto %}Actualizar Producto{% else %}Guardar Producto{% endif %}
                            </button>
                            <a href="{{ url_for('productos') }}" class="btn btn-secondary w-100 mt-2">
                                Cancelar
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ====================================================
         Manejo del formulario de registro / edición de productos
         (JS incrustado directamente para evitar problemas de ruta
         con archivos estáticos)
         ==================================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('formProducto');
            const productoId = document.getElementById('producto_id').value;
            const esEdicion = productoId !== '';

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                // Construcción de los datos del formulario
                const datos = new FormData();
                datos.append('codigo', document.getElementById('codigo').value.trim());
                datos.append('nombre', document.getElementById('nombre').value.trim());
                datos.append('precio', document.getElementById('precio').value.trim());
                datos.append('categoria', document.getElementById('categoria').value.trim());

                // Define la ruta según sea registro nuevo o edición
                const url = esEdicion ? `/actualizar_producto/${productoId}` : '/guardar_producto';

                fetch(url, {
                    method: 'POST',
                    body: datos
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            Swal.fire({
                                title: esEdicion ? "Actualizado" : "Registrado",
                                text: esEdicion
                                    ? "Producto actualizado correctamente."
                                    : "Producto registrado correctamente.",
                                icon: "success"
                            }).then(() => {
                                window.location.href = '/productos';
                            });
                        } else {
                            Swal.fire({
                                title: "Error",
                                text: data.message || (esEdicion ? "Error al actualizar." : "Error al guardar."),
                                icon: "error"
                            });
                        }
                    })
                    .catch(() => {
                        Swal.fire({
                            title: "Error",
                            text: esEdicion ? "Error al actualizar el producto." : "Error al guardar el producto.",
                            icon: "error"
                        });
                    });
            });
        });
    </script>
</body>

</html>
